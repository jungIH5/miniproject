<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 — 뷰티 진단 AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=2.7" />
    <style>
        .auth-container {
            min-height: calc(100vh - 96px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .auth-header h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .auth-header p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #ff8fa3;
            box-shadow: 0 0 0 4px rgba(255,143,163,0.1);
        }
        .btn-auth {
            width: 100%;
            margin-top: 10px;
            height: 50px;
            font-size: 1rem;
            font-weight: 600;
        }
        .auth-footer {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #666;
        }
        .auth-footer a {
            color: #ff8fa3;
            text-decoration: none;
            font-weight: 600;
        }
        .flash-messages {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff0f0;
            color: #e53935;
        }
    </style>
</head>
<body>
  <nav class="app-nav">
    <div class="nav-left">
      <a href="/" class="nav-logo">
        <img src="/static/img/logo.png" class="nav-logo-img" alt="Beuty Inside" />
      </a>
    </div>
    <div class="nav-right">
      <a href="/login" class="btn-logout">로그인</a>
    </div>
  </nav>
  <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">💎</div>
            <div class="auth-header">
                <h2>시작하기</h2>
                <p>나만을 위한 스마트 뷰티 컨설팅 서비스를 이용해보세요</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-messages">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/signup" method="POST">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="원하는 아이디를 입력하세요" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" id="email" name="email" class="form-input" placeholder="example@gmail.com" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호를 입력하세요" required />
                </div>
                <button type="submit" class="btn btn-primary btn-auth">가입하기</button>
            </form>

            <div class="auth-footer">
                이미 계정이 있으신가요? <a href="/login">로그인</a>
            </div>
        </div>
  </div>
</body>
</html>
