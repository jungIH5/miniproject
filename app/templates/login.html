<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로그인 — 뷰티 진단 AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/css/style.css?v=2.7" />
    <style>
        .auth-container {
            min-height: calc(100vh - 96px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #fff5f7 0%, #f0f4ff 100%);
        }
        .auth-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .auth-logo {
            font-size: 2rem;
            margin-bottom: 20px;
        }
        .auth-header h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #1a1a1a;
        }
        .auth-header p {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .form-input:focus {
            outline: none;
            border-color: #ff8fa3;
            box-shadow: 0 0 0 4px rgba(255,143,163,0.1);
        }
        .btn-auth {
            width: 100%;
            margin-top: 10px;
            height: 50px;
            font-size: 1rem;
            font-weight: 600;
        }
        .auth-footer {
            margin-top: 24px;
            font-size: 0.9rem;
            color: #666;
        }
        .auth-footer a {
            color: #ff8fa3;
            text-decoration: none;
            font-weight: 600;
        }
        .flash-messages {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            background: #fff0f0;
            color: #e53935;
        }
        .flash-success {
            background: #f0fff4;
            color: #38a169;
        }
    </style>
</head>
<body>
  <nav class="app-nav">
    <div class="nav-left">
      <a href="/" class="nav-logo">
        <img src="/static/img/logo.png" class="nav-logo-img" alt="Beuty Inside" />
      </a>
    </div>
    <div class="nav-right">
      <a href="/signup" class="btn-logout">회원가입</a>
    </div>
  </nav>
  <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">✨</div>
            <div class="auth-header">
                <h2>환영합니다</h2>
                <p>AI 피부 분석을 시작하려면 로그인하세요</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-messages {% if category == 'success' %}flash-success{% endif %}">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="form-group">
                    <label class="form-label" for="username">아이디</label>
                    <input type="text" id="username" name="username" class="form-input" placeholder="아이디를 입력하세요" required />
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="비밀번호를 입력하세요" required />
                </div>
                <button type="submit" class="btn btn-primary btn-auth">로그인</button>
            </form>

            <div style="margin: 20px 0; display: flex; align-items: center; color: #ccc;">
                <hr style="flex:1; border:0; border-top:1px solid #eee;">
                <span style="margin: 0 10px; font-size: 0.8rem; color: #999;">또는</span>
                <hr style="flex:1; border:0; border-top:1px solid #eee;">
            </div>

            <a href="/naver/login" style="text-decoration: none; margin-bottom: 10px; display: block;">
                <button type="button" class="btn btn-auth" style="background-color: #03C75A; color: white; border: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <span style="background: white; color: #03C75A; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 900; font-size: 14px;">N</span>
                    네이버 아이디로 로그인
                </button>
            </a>

            <a href="/kakao/login" style="text-decoration: none; margin-bottom: 10px; display: block;">
                <button type="button" class="btn btn-auth" style="background-color: #FEE500; color: #3C1E1E; border: none; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3c-4.97 0-9 3.185-9 7.115 0 2.557 1.707 4.8 4.33 6.05l-.81 2.97c-.05.19.06.39.24.46.06.02.12.03.18.03.13 0 .26-.06.33-.18l3.41-2.27c.43.05.87.08 1.32.08 4.97 0 9-3.185 9-7.115S16.97 3 12 3z"/>
                    </svg>
                    카카오 로그인
                </button>
            </a>

            <a href="/google/login" style="text-decoration: none; display: block;">
                <button type="button" class="btn btn-auth" style="background-color: white; color: #757575; border: 1.5px solid #eee; display: flex; align-items: center; justify-content: center; gap: 10px;">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google로 로그인
                </button>
            </a>

            <div class="auth-footer">
                계정이 없으신가요? <a href="/signup">회원가입</a>
            </div>
        </div>
  </div>
</body>
</html>
